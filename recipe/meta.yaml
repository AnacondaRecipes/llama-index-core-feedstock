{% set name = "llama-index-core" %}
{% set version = "0.14.13" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/llama_index_core-{{ version }}.tar.gz
  sha256: c3b30d20ae0407e5d0a1d35bb3376a98e242661ebfc22da754b5a3da1f8108c0

build:
  skip: true # [py<310]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - hatchling
    - pip
    - setuptools ==80.9.0
  run:
    - platformdirs
    - llama-index-workflows >=2,<3,!=2.9.0
    - aiosqlite
    - banks >=2.2.0,<3
    - eval-type-backport >=0.2.0,<0.3.0
    - filetype >=1.2.0,<2
    - typing_extensions >=4.5.0
    - pydantic >=2.8.0
    - wrapt
    - python
    - setuptools >=80.9.0
    - sqlalchemy >=1.4.49
    - dataclasses-json
    - deprecated >=1.2.9.3
    - fsspec >=2023.5.0
    - httpx
    - nest-asyncio >=1.5.8,<2
    - nltk >3.8.1
    - numpy
    - tenacity >=8.2.0,!=8.4.0,<10.0.0
    - tiktoken >=0.7.0
    - typing-extensions >=4.5.0
    - typing_inspect >=0.8.0
    - requests >=2.31.0
    - aiohttp >=3.8.6,<4
    - networkx >=3.0
    - dirtyjson >=1.0.8,<2
    - tqdm >=4.66.1,<5
    - pillow >=9.0.0
    - pyyaml >=6.0.1
  run_constrained:
    - beautifulsoup4 >=4.12.2,<5.0.0
    - langchain >=0.0.303
    - gradientai >=1.4.0
    - asyncpg >=0.29.0,<0.30.0
    - pgvector >=0.3.6,<1.0.0
    - optimum >=1.13.2,<2.0.0
    - sentencepiece *
    - transformers >=4.33.1,<5.0.0
    - guidance >=0.0.64,<0.0.65
    - lm-format-enforcer >=0.4.3,<0.5.0
    - jsonpath-ng >=1.6.0,<2.0.0
    - rank-bm25 >=0.2.2,<0.3.0
    - scikit-learn *
    - spacy >=3.7.1,<4.0.0
    - psycopg2-binary >=2.9.9,<3.0.0

test:
  imports:
    - llama_index.core
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://www.llamaindex.ai/
  summary: Interface between LLMs and your data
  description: |
    The core python package to the LlamaIndex library. Core classes and
    abstractions represent the foundational building blocks for LLM
    applications, most notably, RAG. Such building blocks include
    abstractions for LLMs, Vector Stores, Embeddings, Storage, Callables
    and several others.
  license: MIT
  license_file: LICENSE
  license_family: MIT
  doc_url: https://developers.llamaindex.ai/python/framework/
  dev_url: https://github.com/run-llama/llama_index/tree/main/llama-index-core
extra:
  skip-lints:
    # Linter complaining about setuptools being in run, but it is actually a run dependency
    - python_build_tool_in_run
    - python_build_tools_in_host
  recipe-maintainers:
    - jan-janssen
    - pavelzw
